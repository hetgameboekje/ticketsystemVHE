; Kopieer naar config.ini (niet committen — bevat de API-key) en pas aan.
[intake]
; Basis-URL van het intranet, zonder pad en zonder trailing slash.
api_base_url = https://ticketsysteem.vhe.nl

; Aanmaken via Beheer > API-sleutels op het intranet (rol admin), met scopes "ticket_intake"
; en "aca_intake" aangevinkt. De sleutel wordt maar één keer getoond bij het aanmaken.
api_key = VUL_HIER_DE_API_KEY_IN

; Naam van de gedeelde mailbox zoals die in de Outlook-mapnavigatie staat.
mailbox_naam = IT@vhe.nl

; Naam van de postvak-in-map onder die mailbox (Engels: "Inbox", Nederlands: "Postvak IN").
postvak_naam = Postvak IN

; SMTP-adres waar ACA-case-updatemails vandaan komen.
aca_sender_email = VUL_HIER_HET_ACA_AFZENDERADRES_IN

log_niveau = INFO
